apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment 
spec:
  template:
    spec:
      containers:
      - name: pod-name
        env:
        - name: k8s_cluster
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['asiayo.com/k8s']
        - name: k8s_node_name
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: k8s_namespace_name
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: k8s_pod_name
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: service_name
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['asiayo.com/app']
        - name: env
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['asiayo.com/env']
        - name: product
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['asiayo.com/product']
        - name: log_type
          value: container
