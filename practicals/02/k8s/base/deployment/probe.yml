apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment 
spec:
  template:
    spec:
      containers:
      - name: pod-name
        startupProbe:
          httpGet:
            path: /healthz/startup
            port: http
          initialDelaySeconds: 10
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          periodSeconds: 30
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
