apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prd-asiayo

resources:
- ../../components/example-product/nginx
- ../../components/example-product/nginx/storage
- ../../components/example-product/nodejs
- ./route

namePrefix: prd-

transformers:
- transformer.yml

labels:
- includeSelectors: true
  pairs:
    asiayo.com/env: prd

images:
- name: 48763/nodejs-sample
  newTag: 1.0.2
- name: 48763/nginx
  newTag: 1.12.2


configMapGenerator:
- name: nginx-conf
  files:
  - default.conf=config/nginx.conf
